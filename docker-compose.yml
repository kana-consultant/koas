services:

  # ─── Orchestrator ────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: koas-server/Dockerfile
    restart: unless-stopped
    networks:
      - koas
    environment:
      PORT: "3000"
      DATABASE_URL: sqlite:/data/koas.db
    volumes:
      - orchestrator-data:/data
    tmpfs:
      - /tmp:mode=1777,size=64m
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
          pids: 100
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/servers || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Web (nginx SPA + reverse proxy) ─────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - koas
    ports:
      - "${WEB_PORT:-80}:8080"
    tmpfs:
      - /tmp:mode=1777,size=32m
      - /var/cache/nginx:mode=0755
      - /var/run:mode=0755
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
          pids: 50
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Agent (deploy individually on each VPS) ─────────────────────────────────
  # Local testing:  AGENT_TOKEN=secret docker compose --profile agent up agent
  #
  # Production (run on each VPS):
  #   docker build -f koas-agent/Dockerfile -t koas-agent .
  #   docker run -d --name koas-agent --restart unless-stopped \
  #     --privileged --pid=host --network=host \
  #     -v /var/run/docker.sock:/var/run/docker.sock \
  #     -v /etc/nginx:/etc/nginx:ro \
  #     -v /run/systemd:/run/systemd:ro \
  #     -e AGENT_TOKEN=<secret> koas-agent
  agent:
    build:
      context: .
      dockerfile: koas-agent/Dockerfile
    restart: unless-stopped
    privileged: true
    pid: host
    network_mode: host
    environment:
      AGENT_TOKEN: ${AGENT_TOKEN:?Set AGENT_TOKEN in .env or environment}
      AGENT_PORT: "${AGENT_PORT:-9000}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx:/etc/nginx:ro
      - /run/systemd:/run/systemd:ro
      - /run/dbus:/run/dbus:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
          pids: 100
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- --header='Authorization: Bearer ${AGENT_TOKEN}' http://localhost:${AGENT_PORT:-9000}/health || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - agent

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  koas:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  orchestrator-data:
