name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: koas

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Build frontend
        run: |
          cd apps/web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build binary
        run: cargo build --release --bin koas --target ${{ matrix.target }} --features koas-server/embed-assets
        env:
          AWS_LC_SYS_NO_ASM: "1"

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} koas-${{ matrix.target }}
          tar czf koas-${{ matrix.target }}.tar.gz koas-${{ matrix.target }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: koas-${{ matrix.target }}.tar.gz
          generate_release_notes: true
